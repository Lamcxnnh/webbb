# ==================== 服务配置 ====================
server:
  port: 8080
  servlet:
    context-path: /admin

spring:
  # ==================== 数据源配置 ====================
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/rental_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456

  # ==================== Redis 配置 ====================
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # ==================== 文件上传配置 ====================
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  # ==================== Jackson 配置 ====================
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# ==================== MyBatis-Plus 配置 ====================
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.seig.rental.model.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# ==================== Knife4j 配置 ====================
springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true

knife4j:
  enable: true
  setting:
    language: zh_cn

# ==================== MinIO 配置 ====================
minio:
  endpoint: http://localhost:9000
  access-key: vYSkdgjbeRsIMt2PyU0L
  secret-key: nYIwIErgBscJv2wg6cf3JO2RyJOB47D35t7sh5N2
  bucket-name: rental

# ==================== Sa-Token 配置 ====================
sa-token:
  token-name: rental-admin-token
  timeout: 2592000           # token有效期30天(秒)
  active-timeout: -1          # 永不过期
  is-concurrent: true         # 允许多人同时登录
  is-share: true
  token-style: uuid
  is-log: false
  is-print: false
